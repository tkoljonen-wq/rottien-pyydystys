<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Rottien &amp; Hiirten Pyydystys</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --text: #eaeaea;
      --muted: #8892a4;
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    header {
      background: var(--surface);
      padding: 16px 20px 12px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    header h1 span { color: var(--accent); }

    /* Auth-tila indikaattori */
    #auth-status {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
      min-height: 1em;
    }

    #auth-status.ok { color: #4caf7d; }
    #auth-status.err { color: var(--accent); }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* --- Syöttökortti --- */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
    }

    .card h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    input[type="datetime-local"] {
      flex: 1;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      color-scheme: dark;
    }

    input[type="datetime-local"]:focus {
      border-color: var(--accent);
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn-saalis {
      flex: 1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    #tallenna-rotta { background: var(--accent); }
    #tallenna-hiiri { background: #7b4fcf; }

    .btn-saalis:active { opacity: 0.8; }
    .btn-saalis:disabled { opacity: 0.4; cursor: not-allowed; }

    /* --- Tilastokortti --- */
    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-icon { font-size: 2.4rem; }

    .stat-info { flex: 1; }
    .stat-info .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
    .stat-info .value { font-size: 2.6rem; font-weight: 800; color: var(--accent); line-height: 1; }

    /* --- Tapahtumalista --- */
    .list-header {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0 4px;
    }

    #lista {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tapahtuma {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tapahtuma .nro {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 28px;
    }

    .tapahtuma .pvm {
      flex: 1;
      font-size: 0.95rem;
      padding: 0 10px;
    }

    .tapahtuma .poista {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .tapahtuma .poista:active { color: var(--accent); }

    /* Piilota poisto-nappi jos merkintä ei ole oma */
    .tapahtuma .poista:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .laji-badge {
      font-size: 1.2rem;
      min-width: 24px;
      text-align: center;
    }

    .tyhja {
      text-align: center;
      color: var(--muted);
      padding: 24px;
      font-size: 0.9rem;
    }

    /* --- Latausviesti --- */
    #virhe {
      background: #2d1b1b;
      border: 1px solid #7a2020;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 0.9rem;
      color: #ff8080;
      display: none;
    }

    /* --- Poisto-modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px 20px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }

    .modal p {
      margin-bottom: 20px;
      color: var(--text);
      font-size: 0.95rem;
    }

    .modal-btns {
      display: flex;
      gap: 10px;
    }

    .modal-btns button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    #modal-peruuta {
      background: var(--card);
      color: var(--text);
    }

    #modal-poista {
      background: var(--accent);
      color: #fff;
    }
  </style>
</head>
<body>

<header>
  <h1>Rottien &amp; Hiirten <span>Pyydystys</span></h1>
  <div id="auth-status">Yhdistetään...</div>
</header>

<main>
  <div id="virhe"></div>

  <div class="card">
    <h2>Uusi saalis</h2>
    <div class="input-row" style="margin-bottom:10px">
      <input type="datetime-local" id="aikasyote" />
    </div>
    <div class="btn-row">
      <button class="btn-saalis" id="tallenna-rotta" disabled>🐀 Rotta</button>
      <button class="btn-saalis" id="tallenna-hiiri" disabled>🐭 Hiiri</button>
    </div>
  </div>

  <div style="display:flex;gap:12px">
    <div class="stat" style="flex:1">
      <div class="stat-icon">🐀</div>
      <div class="stat-info">
        <div class="label">Rotat</div>
        <div class="value" id="maara-rotta">—</div>
      </div>
    </div>
    <div class="stat" style="flex:1">
      <div class="stat-icon">🐭</div>
      <div class="stat-info">
        <div class="label">Hiiret</div>
        <div class="value" id="maara-hiiri" style="color:#a07de0">—</div>
      </div>
    </div>
  </div>

  <div class="list-header">Tapahtumat</div>
  <div id="lista"><div class="tyhja">Ladataan...</div></div>
</main>

<!-- Poisto-modal (korvaa confirm()) -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <p>Poistetaanko tämä merkintä?</p>
    <div class="modal-btns">
      <button id="modal-peruuta">Peruuta</button>
      <button id="modal-poista">Poista</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getFirestore, collection, addDoc, deleteDoc, doc,
    onSnapshot, orderBy, query, Timestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import {
    getAuth, signInAnonymously, onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { firebaseConfig } from './firebase-config.js';

  // --- Sallitut lajit (validointi) ---
  const SALLITUT_LAJIT = ['rotta', 'hiiri'];

  // --- Init ---
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const auth = getAuth(app);
  const col = collection(db, 'saaliit');

  // --- PWA service worker ---
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  // --- Aika-syöte: oletuksena nyt ---
  const aikaEl = document.getElementById('aikasyote');
  function setNyt() {
    const now = new Date();
    now.setSeconds(0, 0);
    const offset = now.getTimezoneOffset() * 60000;
    aikaEl.value = new Date(now - offset).toISOString().slice(0, 16);
  }
  setNyt();

  // --- Auth-tila ---
  const authStatusEl = document.getElementById('auth-status');
  let currentUid = null;
  let unsubscribeSnapshot = null;

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUid = user.uid;
      authStatusEl.textContent = '🔒 Yhdistetty';
      authStatusEl.className = 'ok';
      // Aktivoi napit
      document.getElementById('tallenna-rotta').disabled = false;
      document.getElementById('tallenna-hiiri').disabled = false;
      // Käynnistä Firestore-kuuntelu vasta kirjautumisen jälkeen
      kaynnistaNakyma();
    } else {
      currentUid = null;
      authStatusEl.textContent = 'Ei yhteyttä';
      authStatusEl.className = 'err';
      document.getElementById('tallenna-rotta').disabled = true;
      document.getElementById('tallenna-hiiri').disabled = true;
      if (unsubscribeSnapshot) unsubscribeSnapshot();
    }
  });

  // Kirjaudu anonyyminä automaattisesti
  signInAnonymously(auth).catch(e => {
    naytaVirhe('Kirjautuminen epäonnistui: ' + e.message);
    authStatusEl.textContent = 'Kirjautumisvirhe';
    authStatusEl.className = 'err';
  });

  // --- Tallenna ---
  async function tallenna(laji) {
    // Validoi laji
    if (!SALLITUT_LAJIT.includes(laji)) return;
    if (!aikaEl.value) return;
    if (!currentUid) {
      naytaVirhe('Et ole kirjautunut. Yritä uudelleen.');
      return;
    }

    const btns = document.querySelectorAll('.btn-saalis');
    btns.forEach(b => b.disabled = true);
    try {
      const aika = new Date(aikaEl.value);
      await addDoc(col, {
        aika: Timestamp.fromDate(aika),
        laji,
        uid: currentUid   // tallennetaan omistaja
      });
      setNyt();
    } catch (e) {
      naytaVirhe('Tallennus epäonnistui: ' + e.message);
    } finally {
      btns.forEach(b => b.disabled = false);
    }
  }

  document.getElementById('tallenna-rotta').addEventListener('click', () => tallenna('rotta'));
  document.getElementById('tallenna-hiiri').addEventListener('click', () => tallenna('hiiri'));

  // --- Reaaliaikainen lista ---
  function kaynnistaNakyma() {
    const q = query(col, orderBy('aika', 'desc'));
    unsubscribeSnapshot = onSnapshot(q, snap => {
      const docs = snap.docs;
      const rottat = docs.filter(d => (d.data().laji || 'rotta') === 'rotta').length;
      const hiiret = docs.filter(d => d.data().laji === 'hiiri').length;
      document.getElementById('maara-rotta').textContent = rottat;
      document.getElementById('maara-hiiri').textContent = hiiret;

      const lista = document.getElementById('lista');
      if (docs.length === 0) {
        lista.innerHTML = '<div class="tyhja">Ei vielä saaliita.</div>';
        return;
      }
      lista.innerHTML = '';
      docs.forEach((d, i) => {
        const data = d.data();
        const aika = data.aika.toDate();
        const laji = data.laji || 'rotta';
        const ikoni = laji === 'hiiri' ? '🐭' : '🐀';
        const omaItem = data.uid === currentUid;

        const el = document.createElement('div');
        el.className = 'tapahtuma';
        el.innerHTML = `
          <span class="nro">#${docs.length - i}</span>
          <span class="laji-badge">${ikoni}</span>
          <span class="pvm">${formatAika(aika)}</span>
          <button class="poista" title="${omaItem ? 'Poista' : 'Et voi poistaa toisen merkintää'}"
            ${omaItem ? '' : 'disabled'}>✕</button>
        `;
        if (omaItem) {
          el.querySelector('.poista').addEventListener('click', () => avaaPoistaModal(d.id));
        }
        lista.appendChild(el);
      });
    }, err => {
      naytaVirhe('Yhteysongelma: ' + err.message);
    });
  }

  // --- Poista-modal (korvaa confirm()) ---
  let poistettavaId = null;
  const modalOverlay = document.getElementById('modal-overlay');

  function avaaPoistaModal(id) {
    poistettavaId = id;
    modalOverlay.classList.add('active');
  }

  document.getElementById('modal-peruuta').addEventListener('click', () => {
    poistettavaId = null;
    modalOverlay.classList.remove('active');
  });

  document.getElementById('modal-poista').addEventListener('click', async () => {
    modalOverlay.classList.remove('active');
    if (!poistettavaId) return;
    try {
      await deleteDoc(doc(db, 'saaliit', poistettavaId));
    } catch (e) {
      naytaVirhe('Poisto epäonnistui: ' + e.message);
    } finally {
      poistettavaId = null;
    }
  });

  // Sulje modal taustaa klikkaamalla
  modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) {
      poistettavaId = null;
      modalOverlay.classList.remove('active');
    }
  });

  // --- Apufunktiot ---
  function formatAika(d) {
    return d.toLocaleString('fi-FI', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function naytaVirhe(msg) {
    const el = document.getElementById('virhe');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
  }
</script>

</body>
</html>
